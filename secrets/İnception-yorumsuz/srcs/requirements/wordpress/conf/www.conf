[www]
# pool name : [www] -> PHP-FPM havuzu adı
# user/group : hangi kullanıcı/grup altında PHP-FPM child prosesleri çalışacak
user = www-data
group = www-data
# listen : php-fpm'in dinleyeceği adres:port (nginx ile fastcgi bağlantısı için)
listen = 0.0.0.0:9000
# listen.backlog : backlog queue uzunluğu
listen.backlog = 511
# pm : process manager modu (static, dynamic veya ondemand)
pm = dynamic
# pm.max_children : aynı anda oluşturulabilecek maksimum child process sayısı
pm.max_children = 10
# pm.start_servers : başlangıçta oluşturulacak server sayısı (dynamic için)
pm.start_servers = 2
# pm.min_spare_servers : minimum boş (idle) server sayısı
pm.min_spare_servers = 1
# pm.max_spare_servers : maksimum boş server sayısı
pm.max_spare_servers = 3
# pm.max_requests : her child process'in yeniden başlatılmadan önce işleyebileceği istek sayısı
pm.max_requests = 500
# request_terminate_timeout : uzun süren istekleri sonlandırma zamanı (saniye)
request_terminate_timeout = 300
# clear_env : environment değişkenlerinin temizlenip temizlenmeyeceği
clear_env = no
