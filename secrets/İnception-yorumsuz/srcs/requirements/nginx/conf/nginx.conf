## Nginx ana konfigurasyon
# user : nginx proseslerini hangi kullanıcıyla çalıştıracağını belirtir
user www-data;

# worker_processes : kullanılacak worker sayısı. 'auto' genelde çekirdek sayısına göre ayarlar
worker_processes auto;

# pid dosyası : nginx master process id'sinin tutulacağı dosya
pid /run/nginx.pid;

events {
    # worker_connections : her worker'ın eş zamanlı açabileceği bağlantı sayısı
    worker_connections 1024;
}

http {
    # MIME tipleri konfigürasyonunu dahil et
    include /etc/nginx/mime.types;
    # default_type : bilinmeyen dosya tipleri için varsayılan tür
    default_type application/octet-stream;
    
    # sendfile, tcp_nopush : statik dosya servis performansını artıran ayarlar
    sendfile on;
    tcp_nopush on;
    # keepalive_timeout : keep-alive bağlantıların süre sınırı (saniye)
    keepalive_timeout 65;
    
    server {
        # SSL dinleme portu
        listen 443 ssl;
        listen [::]:443 ssl;
        
        # server_name : sunucunun alan adı/hostname'i
        server_name egermen.42.fr;
        
        # SSL sertifika dosyaları
        ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
        # desteklenen TLS versiyonları
        ssl_protocols TLSv1.2 TLSv1.3;
        # sunucu tercihli şifreleme kullan
        ssl_prefer_server_ciphers on;
        
        # Web root ve varsayılan index dosyaları
        root /var/www/html;
        index index.php index.html;
        
        location / {
            # try_files : istenen URI yoksa fallback olarak index.php'ye yönlendir
            try_files $uri $uri/ /index.php?$args;
        }
        
        # PHP dosyalarını FastCGI (php-fpm) ile çalıştırma bölümü
        location ~ \.php$ {
            # fastcgi_split_path_info : PATH_INFO ayrıştırma
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            # php-fpm servisine yönlendir; burada servis adı 'wordpress' ve port 9000
            fastcgi_pass wordpress:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            # SCRIPT_FILENAME : çalıştırılacak PHP dosyasının tam yolu
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            # PATH_INFO değişkenini sağlamaya yardımcı olur
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }
}
