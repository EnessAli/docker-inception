#################################################################
# docker-compose.yml
# Bu dosya: servisler, volume'ler, network'ler ve secret'ları tanımlar.
# Aşağıdaki yorumlar satır satır her anahtarın ve değerin ne anlama geldiğini açıklar.
#################################################################

# -------------------------
# SECRETS
# -------------------------
# 'secrets' bölümü: hassas bilgilerin (parolalar vs.) güvenli şekilde container'a
# iletilmesini sağlar. Container içinde bu değerler `/run/secrets/<name>` altında
# plain-file olarak bulunur.
secrets:
  # db_password: MariaDB için uygulama kullanıcısının parolası
  db_password:
    file: ../secrets/db_password.txt
  # db_root_password: MariaDB root kullanıcısının parolası (ilk kurulumda kullanılır)
  db_root_password:
    file: ../secrets/db_root_password.txt
  # credentials: içinde MYSQL_USER, MYSQL_DATABASE, WP_* gibi ayarlar saklanır
  credentials:
    file: ../secrets/credentials.txt


# -------------------------
# VOLUMES (host bind-mounts)
# -------------------------
# 'volumes' bölümünde named volume tanımlanmış gibi gözükse de burada "bind mount"
# kullanılıyor: hosttaki bir klasör doğrudan container içine bağlanır. Bu sayede
# veriler host üzerinde saklanır ve container'lar yeniden oluşturulsa bile korunur.
volumes:
  # mariadb_volume: host'taki ${HOME}/data/mariadb klasörünü container içinde kullanmak
  mariadb_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/data/mariadb

  # wordpress_volume: WordPress dosyalarını hostta saklamak için bind mount
  wordpress_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/data/wordpress


# -------------------------
# NETWORKS
# -------------------------
# 'net' adında bir bridge network tanımlanır; bu network üzerinde servisler isimle
# birbirlerini çözebilir (ör. wordpress -> mariadb olarak erişim).
networks:
  net:
    name: net
    driver: bridge


# -------------------------
# SERVICES
# -------------------------
# Her servis bir container tanımıdır. Aşağıda servislerin tek tek açıklamaları var.
services:

  ##################################################################
  # MARIADB SERVICE
  ##################################################################
  mariadb:
    # container_name: container'ın host üzerinde görünecek ismi
    container_name: mariadb
    # build: Dockerfile'ın bulunduğu dizin (bu dizinden image build edilir)
    build: ./requirements/mariadb
    # env_file: .env dosyasından değişkenleri container'a aktar
    env_file:
      - .env
    # expose: container içindeki hangi portların diğer container'larca görüleceğini belirtir
    expose:
      - 3306
    # networks: hangi network'e bağlı olacağı
    networks:
      - net
    # volumes: kalıcı veri depolama - MariaDB veri dizini bağlanır
    volumes:
      - mariadb_volume:/var/lib/mysql
    # secrets: hangi secret dosyalarına erişebileceği
    secrets:
      - db_password
      - db_root_password
      - credentials
    # restart: container çökerse ne yapılacağı (always = her zaman yeniden başlat)
    restart: always


  ##################################################################
  # WORDPRESS SERVICE
  ##################################################################
  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    # .env içindeki DOMAIN_NAME, MYSQL_DATABASE vb. değişkenler buradan okunur
    env_file:
      - .env
    # expose: PHP-FPM default portu (sadece container'lar arası erişim için)
    expose:
      - 9000
    networks:
      - net
    # wordpress dosyaları paylaşılan volume'de saklanır (/var/www/html)
    volumes:
      - wordpress_volume:/var/www/html
    # depends_on: hangi servis(ler)in önce başlatılacağını belirler (hazır olma garantisi vermez)
    depends_on:
      - mariadb
    secrets:
      - credentials
      - db_password
    restart: always


  ##################################################################
  # NGINX SERVICE
  ##################################################################
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    # expose: container içi HTTPS portunu belirtir
    expose:
      - 443
    networks:
      - net
    # ports: host <-> container port eşlemesi (host 443 -> container 443)
    ports:
      - "443:443"
    # nginx, WP dosyalarını static serve etmek için aynı volume'u kullanır
    volumes:
      - wordpress_volume:/var/www/html
    depends_on:
      - mariadb
      - wordpress
    secrets:
      - credentials
    restart: always


# -------------------------
# EK NOTLAR
# -------------------------
# - env_file (.env): hassas olmayan konfigürasyonları tutar (domain, db name, user vb.)
# - secrets: gerçek şifreler ve hassas veriler için kullanılır; container içinde /run/secrets/ altında görünür
# - depends_on başlatma sırasını sağlar ama servisin "hazır" olduğunu garanti etmez; bunun için retry/healthcheck gerekir
# - Bind mount kullanırken host işletim sistemi izinleri (UID/GID) ve SELinux ayarlarına dikkat edin
# - Production için self-signed sertifika yerine gerçek CA sertifikası (Let's Encrypt vb.) kullanın

