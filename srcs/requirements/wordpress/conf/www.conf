# ============================================================================
# PHP-FPM POOL YAPILANDIRMASI (www.conf)
# FastCGI Process Manager Ayarları
# ============================================================================
#
# 📌 BU DOSYA NE YAPAR?
# PHP-FPM'in nasıl çalışacağını belirler:
# - Hangi kullanıcı? (www-data)
# - Hangi port? (9000)
# - Kaç worker process? (max 10)
# - İstekler nasıl yönetilir? (dynamic)
#
# ☕ MUTFAK YÖNETİMİ ANALOJİSİ:
# Restoran mutfak kuralları:
# - user/group: Mutfak personeli kim?
# - listen: Telefon numarası (sipariş hattı)
# - pm.max_children: Maksimum kaç aşçı?
# - pm.start_servers: Başlangıçta kaç aşçı hazır?
# - pm.min_spare_servers: En az kaç aşçı beklemede?
# - pm.max_spare_servers: En fazla kaç aşçı beklemede?
#
# ============================================================================

# ============================================================================
# [www] - POOL ADI
# ============================================================================
# Pool: PHP-FPM worker grubu
# Birden fazla pool olabilir (farklı siteler için)
# Biz tek pool kullanıyoruz: www
#
# 🔧 TEKNİK DETAY:
# /etc/php/7.4/fpm/pool.d/ klasöründeki tüm .conf dosyaları okunur
# Her dosya bir pool tanımlar
# ============================================================================
[www]

# ============================================================================
# USER & GROUP - GÜVENLİK
# ============================================================================
# user = www-data: PHP-FPM bu kullanıcı olarak çalışır
# group = www-data: Grup izni
#
# 🤔 NEDEN ROOT DEĞİL?
# Güvenlik! Root yetkisi ile çalışan program → Tehlikeli!
# www-data: Sınırlı yetkiler (sadece web dosyalarına erişim)
#
# ☕ Analoji:
# Mutfak personeli:
# - root: Restoran sahibi (her şeyi yapabilir)
# - www-data: Aşçı (sadece mutfakta iş yapabilir)
#
# DOSYA İZİNLERİ İLİŞKİSİ:
# chown www-data: /var/www/html
# PHP-FPM (www-data) bu dosyaları okuyabilir/yazabilir!
# ============================================================================
user = www-data
group = www-data

# ============================================================================
# LISTEN - NETWORK DİNLEME
# ============================================================================
# listen = 0.0.0.0:9000: Tüm IP'lerden port 9000'i dinle
#
# 0.0.0.0: Wildcard IP (tüm network interface'ler)
# 9000: FastCGI standart portu
#
# 🤔 NEDEN 0.0.0.0?
# Docker network'ünde diğer container'lar bağlanabilsin:
# - nginx container → wordpress:9000
# - Docker DNS → wordpress container IP'si
# - Bağlantı kurulur!
#
# ❌ YANLIŞ AYAR: listen = 127.0.0.1:9000
# Sadece localhost → nginx bağlanamaz (farklı container!)
#
# ❌ YANLIŞ AYAR: listen = /run/php/php7.4-fpm.sock
# Unix socket → Aynı container'da çalışır
# Network bağlantısı yok → nginx erişemez!
#
# ☕ Analoji:
# Mutfak telefonu:
# - 127.0.0.1: İç hat (sadece mutfak içi)
# - 0.0.0.0: Dış hat (tüm binadan aranabilir)
# Nginx farklı "bina" (container) → Dış hat gerekli!
#
# 🔧 TEKNİK DETAY:
# Nginx (nginx.conf):
#   fastcgi_pass wordpress:9000;
# Docker DNS:
#   wordpress → 172.18.0.3 (örnek IP)
# TCP bağlantısı:
#   nginx → 172.18.0.3:9000 → PHP-FPM
# ============================================================================
listen = 0.0.0.0:9000

# ============================================================================
# LISTEN BACKLOG - BAĞLANTI KUYRUĞU
# ============================================================================
# listen.backlog = 511: Bekleyen bağlantı kuyruğu uzunluğu
#
# Backlog nedir?
# Tüm worker'lar meşgul → Yeni bağlantı → Kuyrukta bekle
# Kuyruk doldu → Connection refused!
#
# 511: Standart değer (Linux default)
#
# ☕ Analoji:
# Restoran bekleme alanı:
# - Tüm masalar dolu → Müşteri bekler
# - Bekleme alanı: 511 kişilik
# - 512. kişi → "Yer yok" (connection refused)
#
# 🔧 TEKNİK DETAY:
# Yüksek trafik:
#   İstek/saniye > Worker kapasitesi → Backlog kullanılır
# Backlog doldu:
#   nginx → "502 Bad Gateway" (PHP-FPM bağlantısı reddedildi)
# ============================================================================
listen.backlog = 511

# ============================================================================
# PM (Process Manager) - WORKER YÖNETİMİ
# ============================================================================
# pm = dynamic: Dinamik worker yönetimi
#
# SEÇENEKLER:
# - static: Sabit sayıda worker (her zaman pm.max_children kadar)
# - dynamic: Talebe göre artar/azalır (BİZ BUNU KULLANIYORUZ)
# - ondemand: İstek gelince worker oluştur (lazy loading)
#
# 🤔 NEDEN DYNAMIC?
# - Düşük trafik → Az worker → RAM tasarrufu
# - Yüksek trafik → Çok worker → Performans
#
# ☕ Analoji:
# Mutfak personeli yönetimi:
# - static: Her zaman 10 aşçı (gece de, sessiz saatlerde de)
# - dynamic: 2-10 arası (trafik arttıkça personel çağır)
# - ondemand: Sipariş gelince aşçı çağır (başlangıçta 0)
# ============================================================================
pm = dynamic

# ============================================================================
# PM.MAX_CHILDREN - MAKSİMUM WORKER
# ============================================================================
# pm.max_children = 10: Maksimum 10 worker process
#
# Her worker bir PHP isteği işler (paralel):
# 10 worker → Aynı anda 10 istek işlenebilir
# 11. istek → Backlog'da bekler
#
# 🤔 NASIL BELİRLENİR?
# RAM'e göre:
#   Her PHP-FPM worker ≈ 30-50 MB RAM
#   10 worker ≈ 300-500 MB RAM
#
# Container RAM limiti:
#   docker-compose.yml → mem_limit: 1GB (yoksa)
#   10 worker makul
#
# ☕ Analoji:
# Mutfak kapasitesi:
# - 10 aşçı maksimum sığar
# - 11. aşçı → Yer yok (bekle!)
#
# 🔧 PRODUCTION NOT:
# Yüksek trafik → pm.max_children artır
# Ama RAM'i kontrol et! OOM (Out of Memory) → Container crash
# ============================================================================
pm.max_children = 10

# ============================================================================
# PM.START_SERVERS - BAŞLANGIÇ WORKER
# ============================================================================
# pm.start_servers = 2: Container başlarken 2 worker oluştur
#
# İlk istekler hızlı cevap alır (worker hazır!)
# Trafik artarsa → pm.max_spare_servers'a kadar artar
#
# ☕ Analoji:
# Restoran açılışı:
# - Sabah 2 aşçı işe başlar
# - Öğle yoğunluğu → 3 aşçı daha çağrılır
# - Akşam yoğunluğu → 5 aşçı daha çağrılır (toplam 10)
# ============================================================================
pm.start_servers = 2

# ============================================================================
# PM.MIN_SPARE_SERVERS - MİNİMUM YEDEK WORKER
# ============================================================================
# pm.min_spare_servers = 1: En az 1 boş worker bulundur
#
# Boş worker: İstek bekleyen, meşgul olmayan
# Tüm worker'lar meşgul → Yeni worker oluştur (min_spare sağla)
#
# ☕ Analoji:
# Hazır bekleyen aşçı:
# - En az 1 aşçı boş olmalı (hemen sipariş alabilir)
# - Hepsi meşgul → Yeni aşçı çağır
# ============================================================================
pm.min_spare_servers = 1

# ============================================================================
# PM.MAX_SPARE_SERVERS - MAKSİMUM YEDEK WORKER
# ============================================================================
# pm.max_spare_servers = 3: En fazla 3 boş worker
#
# Çok fazla boş worker → Gereksiz RAM kullanımı
# Trafik azaldı → Fazla worker'ları kapat (max_spare'e düşür)
#
# ☕ Analoji:
# Fazla personel:
# - Restoran sakin → 5 aşçı boş bekliyor (gereksiz!)
# - 3'ü eve gönder → 3 boş aşçı yeter
#
# 🔧 TEKNİK DETAY:
# min_spare ≤ Boş worker sayısı ≤ max_spare
# 1 ≤ Boş worker ≤ 3
# ============================================================================
pm.max_spare_servers = 3

# ============================================================================
# PM.MAX_REQUESTS - WORKER RECYCLE
# ============================================================================
# pm.max_requests = 500: Worker 500 istek işledikten sonra yeniden başlat
#
# 🤔 NEDEN?
# Memory leak önleme:
# - PHP kodu hatalı → RAM sızıntısı
# - Worker sürekli çalışırsa → RAM dolar
# - 500 istekte bir worker restart → RAM temizlenir
#
# ☕ Analoji:
# Aşçı mola:
# - Aşçı 500 yemek yaptı → Yoruldu, unutkanlık başladı
# - Mola ver, yeni aşçı getir → Taze, dikkatli
#
# 🔧 TEKNİK DETAY:
# Worker restart:
# - Graceful restart (mevcut istekler tamamlanır)
# - Yeni worker oluşturulur
# - Eski worker kapanır
# - RAM sızıntısı temizlenir!
# ============================================================================
pm.max_requests = 500

# ============================================================================
# REQUEST_TERMINATE_TIMEOUT - İSTEK ZAMAN AŞIMI
# ============================================================================
# request_terminate_timeout = 300: İstek 300 saniyede bitirildirin
#
# Uzun süren PHP kodu:
# - Sonsuz döngü → Worker asılı kalır
# - 300 saniye → Worker kill edilir
# - Timeout error → Kullanıcı
#
# ☕ Analoji:
# Yemek pişirme süresi:
# - Normal yemek: 5 dakika
# - Karmaşık yemek: 10 dakika
# - 300 dakika (5 saat) süren yemek → İptal et! (Hata var)
#
# 🔧 TEKNİK DETAY:
# WordPress:
#   - Plugin yükleme → 30 saniye
#   - Tema güncelleme → 60 saniye
#   - Backup oluşturma → 120 saniye
#   - 300 saniye yeterli (uzun işlemler için)
#
# PRODUCTION NOT:
# Çok uzun işlemler → Cron job kullan (background)
# ============================================================================
request_terminate_timeout = 300

# ============================================================================
# CLEAR_ENV - ENVIRONMENT VARIABLES
# ============================================================================
# clear_env = no: Environment variable'ları PHP'ye aktar
#
# Environment variables:
#   - MYSQL_DATABASE, MYSQL_USER, vb.
#   - Secrets'lardan yüklenenler
#
# clear_env = yes: PHP görmez (güvenlik)
# clear_env = no: PHP görür (bizim ihtiyacımız!)
#
# 🤔 NEDEN NO?
# wordpress-start.sh:
#   export MYSQL_DATABASE=...
#   export WP_ADMIN_LOGIN=...
# PHP kodu bu değerlere erişebilmeli!
#
# ☕ Analoji:
# Mutfak talimatları:
# - clear_env = yes: Aşçı notları göremez
# - clear_env = no: Aşçı notları okuyabilir (tarif bilgileri)
#
# 🔧 GÜVENLİK NOTU:
# Production'da dikkatli!
# Gereksiz env var → Güvenlik riski
# Sadece gerekli olanları aktar (whitelist)
# ============================================================================
clear_env = no

# ============================================================================
# ÖZET - WWW.CONF'TAN ÖĞRENDİKLERİMİZ
# ============================================================================
#
# 1. [www]: Pool adı
# 2. user/group = www-data: Güvenlik (root değil)
# 3. listen = 0.0.0.0:9000: Network dinleme (nginx bağlanır)
# 4. listen.backlog = 511: Bağlantı kuyruğu
# 5. pm = dynamic: Talebe göre worker yönetimi
# 6. pm.max_children = 10: Maksimum 10 worker
# 7. pm.start_servers = 2: Başlangıçta 2 worker
# 8. pm.min_spare_servers = 1: En az 1 boş worker
# 9. pm.max_spare_servers = 3: En fazla 3 boş worker
# 10. pm.max_requests = 500: 500 istekte restart (memory leak önleme)
# 11. request_terminate_timeout = 300: 5 dakika timeout
# 12. clear_env = no: Environment variable'ları aktar
#
# WORKER DİNAMİĞİ (Örnek Senaryo):
# Container başlar:
#   → 2 worker oluşturulur (pm.start_servers)
#
# 10 istek gelir:
#   → 2 worker meşgul
#   → min_spare = 1 sağlanmadı
#   → 3 yeni worker oluşturulur (toplam 5)
#   → 3 worker meşgul, 2 boş (min_spare sağlandı)
#
# 50 istek gelir (trafik patlaması):
#   → 5 worker meşgul
#   → min_spare = 1 sağlanmadı
#   → 5 yeni worker oluşturulur (toplam 10 - max!)
#   → 10 worker meşgul
#
# Trafik azalır (5 istek):
#   → 5 worker meşgul, 5 boş
#   → max_spare = 3 aşıldı (5 > 3)
#   → 2 worker kapatılır (toplam 8)
#   → 5 worker meşgul, 3 boş (max_spare sağlandı)
#
# DİĞER DOSYALARLA İLİŞKİ:
# - nginx.conf: fastcgi_pass wordpress:9000 → Buraya bağlanır
# - Dockerfile: COPY www.conf → Bu dosya kopyalanır
# - wordpress-start.sh: Environment variable'lar → clear_env=no sayesinde PHP görür
# - docker-compose.yml: networks: net → Container'lar iletişim kurar
#
# PERFORMANS OPTİMİZASYONU:
# Düşük trafik: 2-3 worker (RAM tasarrufu)
# Orta trafik: 5-7 worker (dengeli)
# Yüksek trafik: 10 worker (maksimum)
# Backlog: 511 (bekleyen istekler)
# Timeout: 300s (uzun işlemler)
# ============================================================================
