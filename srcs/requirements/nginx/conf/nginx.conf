# ============================================================================
# NGİNX YAPILANDIRMA DOSYASI
# Web Sunucu + HTTPS + Reverse Proxy Ayarları
# ============================================================================
#
# 📌 GENEL AÇIKLAMA:
# Bu dosya nginx'in davranışını kontrol eder:
# - Hangi porttan dinle? (443 - HTTPS)
# - SSL sertifikaları nerede?
# - WordPress dosyaları nerede? (/var/www/html)
# - PHP isteklerini nereye yönlendir? (wordpress:9000)
#
# ☕ GÜNLÜK HAYAT ÖRNEĞİ:
# Restoran çalışma kuralları:
# - Kapı numarası (port 443)
# - Menü (root /var/www/html)
# - Basit siparişler (static) → Garson direkt getirir
# - Karmaşık siparişler (PHP) → Mutfağa iletir
# ============================================================================

# Nginx hangi kullanıcı olarak çalışır?
# www-data: Nginx'in standart kullanıcısı (güvenlik için root değil!)
user www-data;

# Kaç worker process çalışsın?
# auto: CPU çekirdek sayısı kadar (optimal performans)
worker_processes auto;

# Process ID dosyası nerede?
# /run/nginx.pid: Nginx'in PID'si burada saklanır
pid /run/nginx.pid;

# ============================================================================
# EVENTS BLOĞU - Bağlantı İşleme
# ============================================================================
# worker_connections: Bir worker'ın aynı anda kaç bağlantı işleyeceği
# 1024: Standart değer (1024 eşzamanlı bağlantı/worker)
# worker_processes auto (4 CPU) × 1024 = 4096 toplam bağlantı
events {
    worker_connections 1024;
}

# ============================================================================
# HTTP BLOĞU - Web Sunucu Ayarları
# ============================================================================
http {
    # MIME types dosyasını dahil et (dosya uzantısı → içerik tipi)
    # .html → text/html, .jpg → image/jpeg, .css → text/css
    include /etc/nginx/mime.types;
    
    # Bilinmeyen dosyalar için varsayılan tip
    # application/octet-stream: Binary dosya (indir)
    default_type application/octet-stream;
    
    # Dosya gönderme optimizasyonu (kernel sendfile syscall kullan)
    # Çok daha hızlı! Veriyi kullanıcı alanına kopyalamaz
    sendfile on;
    
    # TCP_NOPUSH: Paketleri birleştir (performans artışı)
    # Küçük paketler yerine büyük paketler gönder
    tcp_nopush on;
    
    # Keep-alive timeout: Bağlantıyı açık tut (saniye)
    # 65 saniye boyunca aynı bağlantıyı tekrar kullanabilir
    keepalive_timeout 65;
    
    # ========================================================================
    # SERVER BLOĞU - Sanal Sunucu Ayarları
    # ========================================================================
    # Her "server" bloğu bir website temsil eder
    # Birden fazla site için birden fazla server bloğu olabilir
    # ========================================================================
    server {
        # ====================================================================
        # HTTPS PORTU - 443
        # ====================================================================
        # listen 443 ssl: Port 443'te SSL ile dinle (IPv4)
        # listen [::]:443 ssl: Port 443'te SSL ile dinle (IPv6)
        # [::]: IPv6 wildcard adresi (0.0.0.0'ın IPv6 karşılığı)
        # ====================================================================
        listen 443 ssl;
        listen [::]:443 ssl;
        
        # ====================================================================
        # DOMAIN ADI
        # ====================================================================
        # server_name: Bu sunucu hangi domain'e cevap verir?
        # egermen.42.fr: Host header bu değere eşitse bu server bloğu çalışır
        #
        # Örnek istek:
        #   Browser → GET / HTTP/1.1
        #            Host: egermen.42.fr
        # Nginx: "server_name egermen.42.fr" → Bu server bloğunu kullan!
        # ====================================================================
        server_name egermen.42.fr;
        
        # ====================================================================
        # SSL SERTİFİKASI AYARLARI
        # ====================================================================
        # ssl_certificate: Public key (sertifika)
        # ssl_certificate_key: Private key (gizli anahtar)
        # Dockerfile'da oluşturduğumuz self-signed sertifika
        #
        # ssl_protocols: Hangi TLS versiyonları kabul edilir?
        # TLSv1.2, TLSv1.3: Güvenli versiyonlar
        # TLSv1.0, TLSv1.1: ESKİ, GÜVENSİZ, kullanma!
        #
        # ssl_prefer_server_ciphers: Sunucu cipher seçsin (güvenlik)
        # on: Sunucunun cipher tercihi öncelikli
        # ====================================================================
        ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        
        # ====================================================================
        # DOCUMENT ROOT
        # ====================================================================
        # root: Website dosyalarının bulunduğu klasör
        # /var/www/html: WordPress dosyaları burada
        # Volume mount: wordpress_volume:/var/www/html
        #
        # index: Varsayılan dosyalar (sırayla dene)
        # 1. index.php (WordPress ana dosyası)
        # 2. index.html (fallback)
        # ====================================================================
        root /var/www/html;
        index index.php index.html;
        
        # ====================================================================
        # LOCATION BLOĞU - Root (/)
        # ====================================================================
        # location /: Tüm istekler için (wildcard)
        #
        # try_files mantığı (sırayla dene):
        # 1. $uri: İstenen dosya var mı? (örnek: /style.css)
        # 2. $uri/: Klasör mü? (örnek: /blog/)
        # 3. /index.php?$args: Yoksa WordPress'e yönlendir
        #
        # Örnekler:
        #   İstek: /wp-content/uploads/photo.jpg
        #     → Dosya var → Direkt serve et (nginx)
        #
        #   İstek: /blog/my-post
        #     → Dosya yok → /index.php?blog/my-post (WordPress işler)
        #
        # ☕ Restoran analojisi:
        # - Hazır yemek var mı bak (static file)
        # - Varsa direkt servis et (hızlı!)
        # - Yoksa mutfaktan iste (WordPress/PHP)
        # ====================================================================
        location / {
            try_files $uri $uri/ /index.php?$args;
        }
        
        # ====================================================================
        # LOCATION BLOĞU - PHP Dosyaları
        # ====================================================================
        # location ~ \.php$: .php ile biten dosyalar için
        # ~ : Regex match
        # \.php$: .php ile bitenler ($ = satır sonu)
        #
        # Eşleşen dosyalar:
        #   ✅ index.php
        #   ✅ wp-admin/admin.php
        #   ✅ wp-content/plugins/xxx.php
        #   ❌ style.css
        #   ❌ image.jpg
        #
        # Bu blok PHP isteklerini WordPress'e (PHP-FPM) yönlendirir.
        # ====================================================================
        location ~ \.php$ {
            # ================================================================
            # PATH_INFO AYIKLAMA
            # ================================================================
            # fastcgi_split_path_info: URL'yi böl
            # ^(.+\.php)(/.+)$:
            #   - .php'ye kadar → Script adı
            #   - Sonrası → Path info
            #
            # Örnek: /index.php/blog/post
            #   SCRIPT_NAME: /index.php
            #   PATH_INFO: /blog/post
            # ================================================================
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            
            # ================================================================
            # PHP-FPM'E YÖNLENDIR
            # ================================================================
            # fastcgi_pass: PHP isteklerini nereye gönder?
            # wordpress:9000:
            #   - wordpress: Container adı (Docker DNS)
            #   - 9000: PHP-FPM portu
            #
            # Docker network sayesinde:
            #   nginx container → "wordpress" resolve edilir
            #   → wordpress container IP'si bulunur
            #   → FastCGI protokolü ile istek gönderilir
            #
            # ☕ Analoji:
            # Garson mutfağı arıyor:
            #   - Mutfak numarası: wordpress:9000
            #   - Apartman telefon sistemi (Docker DNS) numarayı çözümler
            #   - Bağlantı kurulur, sipariş iletilir
            # ================================================================
            fastcgi_pass wordpress:9000;
            
            # fastcgi_index: Varsayılan dosya
            # Klasör istekleri için index.php kullan
            fastcgi_index index.php;
            
            # FastCGI parametrelerini dahil et (standart ayarlar)
            include fastcgi_params;
            
            # ================================================================
            # FASTCGİ PARAMETRELERİ
            # ================================================================
            # SCRIPT_FILENAME: PHP dosyasının tam yolu
            # $document_root: /var/www/html
            # $fastcgi_script_name: /index.php
            # → /var/www/html/index.php
            #
            # WordPress container'da aynı dosya:
            #   Nginx: /var/www/html/index.php
            #   WordPress: /var/www/html/index.php
            # Shared volume sayesinde! wordpress_volume
            # ================================================================
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            
            # PATH_INFO parametresi (URL path bilgisi)
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }
}

# ============================================================================
# ÖZET - NGINX.CONF'TAN ÖĞRENDİKLERİMİZ
# ============================================================================
#
# 1. user www-data: Güvenlik (root değil!)
# 2. worker_processes auto: CPU kullanımı optimize
# 3. events: Bağlantı yönetimi (1024/worker)
# 4. http bloğu: Web sunucu ayarları
# 5. server bloğu: Sanal sunucu (website)
# 6. listen 443 ssl: HTTPS portu
# 7. server_name: Domain kontrolü
# 8. SSL ayarları: Sertifika + protokoller
# 9. root + index: WordPress dosyaları
# 10. location /: Static dosya + fallback
# 11. location ~ \.php$: PHP işleme
# 12. fastcgi_pass wordpress:9000: PHP-FPM bağlantısı
# 13. fastcgi_param: PHP'ye bilgi aktar
#
# İSTEK AKIŞI:
# Browser → https://egermen.42.fr/index.php
#   ↓ SSL handshake (sertifika doğrulama)
# Nginx (port 443)
#   ↓ server_name eşleşiyor mu? ✅
#   ↓ .php dosyası → location ~ \.php$ bloğu
#   ↓ fastcgi_pass wordpress:9000
# WordPress Container (PHP-FPM)
#   ↓ PHP kodu çalışır
#   ↓ MariaDB'ye bağlanır (veri çeker)
#   ↓ HTML oluşturur
# Nginx
#   ↓ Response'u SSL ile şifreler
# Browser (sayfa gösterir)
#
# STATIC DOSYA AKIŞI:
# Browser → https://egermen.42.fr/style.css
#   ↓
# Nginx (port 443)
#   ↓ location / bloğu
#   ↓ try_files $uri → /var/www/html/style.css var mı?
#   ↓ Var! Direkt serve et (PHP-FPM'e sormaz)
# Browser (CSS alır)
#
# GÜVENLİK:
# - HTTPS only (HTTP yok)
# - TLSv1.2+ (eski protokoller kapalı)
# - Self-signed sertifika
# - www-data kullanıcısı (root değil)
#
# PERFORMANS:
# - sendfile (kernel optimization)
# - tcp_nopush (paket birleştirme)
# - keepalive (bağlantı yeniden kullanımı)
# - Static dosya caching
# ============================================================================
